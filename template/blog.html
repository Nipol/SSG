<!DOCTYPE html>
<html lang="<!-- LANGUAGE_CODE -->">
  <head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="<!-- TITLE -->">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://ysnim.ink/<!-- LINK -->/<!-- IMAGE -->">
    <meta property="og:description" content="<!-- DESC -->">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    >
    <title><!-- TITLE --></title>
    <script>
      (() => {
        const storageKey = 'theme-preference';
        const storedPreference = localStorage.getItem(storageKey);
        const preference = storedPreference === 'light' || storedPreference === 'dark' || storedPreference === 'system'
          ? storedPreference
          : 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const resolvedTheme = preference === 'dark' || (preference === 'system' && prefersDark) ? 'dark' : 'light';
        const root = document.documentElement;

        root.dataset.themePreference = preference;
        root.dataset.themeResolved = resolvedTheme;
        root.classList.toggle('dark', resolvedTheme === 'dark');
        root.classList.toggle('light', resolvedTheme === 'light');
        root.style.colorScheme = resolvedTheme;
      })();
    </script>
    <link rel="stylesheet" href="/build.css">
  </head>
  <body>
    <!-- NavBar -->

    <main class="article-shell">
      <header class="article-header">
        <h1 class="article-title col-span-5"><!-- TITLE --></h1>
        <div class="article-meta"><!-- PUBLISH_DATE --></div>
      </header>
      <nav class="translation-nav width-w-full flex justify-start space-x-2">
        <!-- TRANSLATE -->
      </nav>
      <div id="contents" class="article-contents">
        <!-- CONTENTS -->
      </div>
    </main>

    <script>
      (() => {
        const storageKey = 'theme-preference';
        const media = window.matchMedia('(prefers-color-scheme: dark)');
        const themeButton = document.querySelector('[data-theme-cycle]');
        const themeIcon = themeButton?.querySelector('[data-theme-icon-current]');
        const themeIconPaths = {
          system: '<rect x="3" y="4" width="18" height="13" rx="2"></rect><path d="M8 20h8M12 17v3"></path>',
          light:
            '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2.5M12 19.5V22M4.93 4.93l1.77 1.77M17.3 17.3l1.77 1.77M2 12h2.5M19.5 12H22M4.93 19.07l1.77-1.77M17.3 6.7l1.77-1.77"></path>',
          dark: '<path d="M20.5 14.8A8.5 8.5 0 1 1 9.2 3.5a7 7 0 1 0 11.3 11.3Z"></path>',
        };

        const isValidPreference = (value) => value === 'light' || value === 'dark' || value === 'system';

        const readPreference = () => {
          const fromDom = document.documentElement.dataset.themePreference;
          if (isValidPreference(fromDom)) return fromDom;
          const fromStorage = localStorage.getItem(storageKey);
          return isValidPreference(fromStorage) ? fromStorage : 'system';
        };

        const resolveTheme = (preference) => {
          if (preference === 'dark') return 'dark';
          if (preference === 'system') return media.matches ? 'dark' : 'light';
          return 'light';
        };

        const nextPreference = (preference) => {
          if (preference === 'system') return 'light';
          if (preference === 'light') return 'dark';
          return 'system';
        };

        const getPreferenceLabel = (preference, resolvedTheme) => {
          if (preference === 'system') return `System (${resolvedTheme === 'dark' ? 'Dark' : 'Light'})`;
          return preference === 'dark' ? 'Dark' : 'Light';
        };

        const getPreferenceIcon = (preference) => {
          if (preference === 'system') return 'system';
          return preference === 'dark' ? 'dark' : 'light';
        };

        const setThemeIcon = (iconName) => {
          if (!themeIcon || !themeIconPaths[iconName]) return;
          themeIcon.dataset.themeIconCurrent = iconName;
          themeIcon.innerHTML = themeIconPaths[iconName];
        };

        const applyPreference = (preference, shouldPersist) => {
          const resolvedTheme = resolveTheme(preference);
          const root = document.documentElement;

          root.dataset.themePreference = preference;
          root.dataset.themeResolved = resolvedTheme;
          root.classList.toggle('dark', resolvedTheme === 'dark');
          root.classList.toggle('light', resolvedTheme === 'light');
          root.style.colorScheme = resolvedTheme;

          if (themeButton) {
            const next = nextPreference(preference);
            const activeIcon = getPreferenceIcon(preference);

            themeButton.dataset.themePreference = preference;
            themeButton.dataset.themeResolved = resolvedTheme;
            themeButton.setAttribute(
              'aria-label',
              `Current theme: ${getPreferenceLabel(preference, resolvedTheme)}. Switch to ${
                getPreferenceLabel(next, resolveTheme(next))
              } theme.`,
            );
            themeButton.title = `Theme: ${getPreferenceLabel(preference, resolvedTheme)}`;
            setThemeIcon(activeIcon);
          }

          if (shouldPersist) {
            localStorage.setItem(storageKey, preference);
          }
        };

        if (themeButton) {
          themeButton.addEventListener('click', () => {
            applyPreference(nextPreference(readPreference()), true);
          });
        }

        const handleSystemThemeChange = () => {
          if (readPreference() === 'system') applyPreference('system', false);
        };

        if (typeof media.addEventListener === 'function') {
          media.addEventListener('change', handleSystemThemeChange);
        } else {
          media.addListener(handleSystemThemeChange);
        }

        applyPreference(readPreference(), false);
      })();

      // Register the service worker
      if ('serviceWorker' in navigator) {
        let refreshing = false;
        const hadController = Boolean(navigator.serviceWorker.controller);
        const requestActivationAfterCache = function (worker) {
          if (!hadController || !worker) return;
          if (worker.state === 'installed') {
            worker.postMessage({ type: 'SKIP_WAITING' });
            return;
          }

          worker.addEventListener('statechange', function () {
            if (worker.state === 'installed') {
              worker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        };

        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (!hadController || refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/service-worker.js', { updateViaCache: 'none' }).then(
            function (registration) {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
              requestActivationAfterCache(registration.waiting);
              registration.addEventListener('updatefound', function () {
                requestActivationAfterCache(registration.installing);
              });
              registration.update().catch(function (err) {
                console.log('ServiceWorker update check failed: ', err);
              });
            },
            function (err) {
              console.log('ServiceWorker registration failed: ', err);
            },
          );
        });
      }
    </script>
  </body>
</html>
